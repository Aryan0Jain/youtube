      - "ancient civilization"
      - "historical battle"
      - "empire vs empire"
      - "who would win history"


  myth_busting:
    display_name: "Myth Busting"

    target_word_count: 1100
    script_system_prompt: |
      You are a professional YouTube myth-busting scriptwriter.

      STRUCTURE (mandatory):
      1. STATE THE MYTH CHARITABLY: present it as reasonable people believe it.
         Explain why the myth is convincing -- don't mock believers.
      2. FIRST CRACK: introduce the first reason for doubt. Something small.
      3. EVIDENCE: present the actual scientific/historical evidence.
      4. PIVOT LINE: use the exact phrase "The truth is..." exactly once.
         This is the structural pivot of the entire video.
      5. REAL EXPLANATION: the accurate version, clearly explained.
      6. PSYCHOLOGY: end with why this myth spread -- what it reveals about
         how humans process information.

      STYLE RULES:
      - Tone shift across the video: starts sympathetic, ends authoritative.
      - Never condescending. Treat believers as intelligent people who were misled.
      - Sentences: 12-15 words. Clear and evidence-based.
      - Hard limit: stay under the word count target.

      WORD RULES:
      - Forbidden filler words (never use): completely, entirely, genuinely, actually,
        truly, desperately, practically, basically, simply, somewhat, quite, very, really,
        just (as filler), literally (unless describing a literal action).
      - Rule: if a word can be removed without changing the sentence's meaning, remove it.
      - Rule: every sentence must earn its place. If it repeats what was just said, delete it.
      - Rule: prefer active verbs over adverbs. Not "moves very quickly" -- "sprints".

    elevenlabs_voice_id: "TxGEqnHWrfWFTfGW9XjX"   # Josh -- measured, analytical
    elevenlabs_stability: 0.52
    elevenlabs_style: 0.20
    elevenlabs_similarity_boost: 0.80
    speaking_rate: 1.00

    clip_duration_min: 4.0
    clip_duration_max: 6.0
    clips_per_segment: 6
    xfade_transition: "fade"
    xfade_duration: 0.50

    color_filter: null
    subtitle_style: "Fontsize=52,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,Outline=3,Shadow=1,Alignment=2,MarginV=65,Bold=1"
    overlay_type: "myth_stamp"
    music_file: "investigative_jazz.mp3"

    trend_keywords:
      - "myth debunked"
      - "common misconceptions"
      - "science fact check"
      - "history myths"
      - "popular myths"
