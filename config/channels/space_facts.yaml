channel_id: space_facts
display_name: "Cosmos Unlocked"
youtube_channel_id: UCyyyyyyyyyyyyyyyyyyyyy
oauth_token_path: config/credentials/space_facts_oauth.json

overrides:
  tts_voice: en-US-Neural2-I
  upload_privacy: public

series:
  - series_id: top10_space
    display_name: "Top 10 Space Facts"
    format: full_length
    niche: ranking
    style_notes: >
      Countdown format from #10 to #1. Most surprising or impactful fact last.
      Energetic, upbeat tone with a sense of wonder. Each item gets roughly 60
      seconds: state the rank, give the fact with a specific number or NASA data
      point, add brief human context. End with a cliffhanger teasing the #1 slot.

    schedule:
      days_of_week: [tuesday, saturday]
      time_utc: "13:00"

    topic_source:
      type: google_sheet
      sheet_id: REPLACE_WITH_YOUR_SHEET_ID
      tab_name: top10_topics
      topic_column: A
      used_column: B

  - series_id: space_shorts
    display_name: "60-Second Space Facts"
    format: shorts
    niche: shock_facts
    style_notes: >
      One mind-blowing space fact per Short. Hook in first 3 words.
      State the fact, give one number that makes it tangible, add one
      "this means..." implication. No intro. No outro. Pure information shock.

    schedule:
      days_of_week: [monday, wednesday, friday, sunday]
      time_utc: "12:00"

    topic_source:
      type: claude_autogen
      autogen_prompt: >
        Generate a single mind-blowing space or astronomy fact suitable for a
        60-second YouTube Short. It must contain at least one specific number or
        measurement. Return only the fact topic title, nothing else.
      avoid_recent_topics: true
