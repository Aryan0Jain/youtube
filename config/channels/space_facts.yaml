channel_id: space_facts
display_name: "Cosmos Unlocked"
youtube_channel_id: UCyyyyyyyyyyyyyyyyyyyyy
oauth_token_path: config/credentials/space_facts_oauth.json

overrides:
  tts_voice: en-US-Neural2-I
  upload_privacy: public

series:
  - series_id: top10_space
    display_name: "Top 10 Space Facts"
    format: full_length
    niche: ranking
    style_notes: >
      Countdown format from #10 to #1. Most surprising or impactful fact last.
      Energetic, upbeat tone with a sense of wonder. Each item gets roughly 60
      seconds: state the rank, give the fact with a specific number or NASA data
      point, add brief human context. End with a cliffhanger teasing the #1 slot.

    schedule:
      days_of_week: [tuesday, saturday]
      time_utc: "13:00"

    topic_source:
      type: trend_autogen
      opportunity_threshold: 6
      timeframe: "now 7-d"
      avoid_recent_topics: true
      fallback_autogen_prompt: >
        Generate a compelling YouTube countdown topic for a Top 10 ranking video.
        Topics should be dramatic, visual, and work well as "Top 10 [X]" or
        "The [N] Most [Adjective] [Things]" formats. Prefer space, science, and
        natural world topics. Return only the topic title, nothing else.
